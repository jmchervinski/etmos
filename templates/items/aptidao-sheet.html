<form class="{{cssClass}} etmos-sheet etmos-item" autocomplete="off">
  <header class="sheet-header">
    <img class="profile-img" src="{{item.img}}" data-edit="img" title="{{item.name}}" />
    <input class="nome-item" name="name" type="text" value="{{item.name}}" placeholder="Nome da Aptidão" />
  </header>
  <div class="sheet-body">
    <label class="checkbox">É um Ataque?
      <input type="checkbox" name="system.ehAtaque" {{#if system.ehAtaque}}checked{{/if}} />
    </label>
    <label>Ferimentos causados (ex: "2 numa Defesa Ineficaz")
      <input type="text" name="system.ferimentos" value="{{system.ferimentos}}" />
    </label>
    <label>Descrição</label>
    {{editor content=system.description target="system.description" button=true engine="prosemirror" owner=owner}}
  </div>
</form>
